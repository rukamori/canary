name: Daily Nightly Build

on:
  repository_dispatch:
    types: [trigger-nightly]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.distribution }}-${{ matrix.device }}-${{ matrix.abi }})
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ env.NEW_VERSION }}
      new_version_code: ${{ env.NEW_VERSION_CODE }}
      date: ${{ steps.date.outputs.date }}
      time: ${{ steps.time.outputs.time }}
      since_sha: ${{ steps.last_release.outputs.SINCE_SHA }}
    strategy:
      matrix:
        distribution: [gms, foss]
        device: [mobile, tv]
        abi: [arm64, armeabi, x86, x86_64, universal]
        exclude:
          - device: tv
            abi: arm64
          - device: tv
            abi: armeabi
          - device: tv
            abi: x86
          - device: tv
            abi: x86_64

    steps:
      - uses: actions/checkout@v7
        with:
          repository: rukamori/ArchiveTune
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN || secrets.PAT_TOKEN }}
          submodules: true

      - name: Get last release info
        id: last_release
        run: |
          RESPONSE=$(curl -s -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          BODY=$(echo "$RESPONSE" | jq -r '.body // ""')
          if [ -n "$BODY" ] && [ "$BODY" != "null" ]; then
            SHA=$(echo "$BODY" | awk '/^## ✨ Changelog$/ {found=1; next} found && /commit\// {match($0, /commit\/([a-f0-9]+)/, a); print a[1]; exit}')
            echo "SINCE_SHA=$SHA" >> $GITHUB_OUTPUT
          else
            echo "SINCE_SHA=" >> $GITHUB_OUTPUT
          fi

      - name: Date
        id: date
        run: echo "date=$(date +'%Y/%m/%d')" >> $GITHUB_OUTPUT

      - name: Time
        id: time
        run: echo "time=$(date +'%I:%M:%S %p')" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve variant names
        id: variant
        shell: bash
        run: |
          set -euo pipefail
          DEVICE="${{ matrix.device }}"
          ABI="${{ matrix.abi }}"
          DISTRIBUTION="${{ matrix.distribution }}"
          DEVICE_CAP="$(tr '[:lower:]' '[:upper:]' <<< "${DEVICE:0:1}")${DEVICE:1}"
          ABI_CAP="$(tr '[:lower:]' '[:upper:]' <<< "${ABI:0:1}")${ABI:1}"
          DIST_CAP="$(tr '[:lower:]' '[:upper:]' <<< "${DISTRIBUTION:0:1}")${DISTRIBUTION:1}"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "abi=$ABI" >> "$GITHUB_OUTPUT"
          echo "distribution=$DISTRIBUTION" >> "$GITHUB_OUTPUT"
          echo "device_cap=$DEVICE_CAP" >> "$GITHUB_OUTPUT"
          echo "abi_cap=$ABI_CAP" >> "$GITHUB_OUTPUT"
          echo "distribution_cap=$DIST_CAP" >> "$GITHUB_OUTPUT"
          echo "gradle_task=assemble${DIST_CAP}${DEVICE_CAP}${ABI_CAP}Release" >> "$GITHUB_OUTPUT"
          echo "artifact_name=app-${DISTRIBUTION}-${DEVICE}-${ABI}-nightly" >> "$GITHUB_OUTPUT"
          echo "apk_name=app-${DISTRIBUTION}-${DEVICE}-${ABI}-nightly.apk" >> "$GITHUB_OUTPUT"

      - name: Resolve build hash
        id: build_hash
        shell: bash
        run: |
          set -euo pipefail
          echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Update version name and code for nightly build
        run: |
          ORIGINAL_VERSION=$(grep 'versionName = ' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)"/\1/')
          ORIGINAL_VERSION_CODE=$(grep 'versionCode = ' app/build.gradle.kts | head -n1 | sed 's/.*versionCode = \(.*\)/\1/' | tr -d '[:space:]')
          NEW_VERSION="N$(date +%Y%m%d)"
          NEW_VERSION_CODE="${GITHUB_RUN_NUMBER}"
          if [ -z "$NEW_VERSION_CODE" ]; then
            NEW_VERSION_CODE=$(date +%Y%m%d)
          fi
          sed -i "s/versionName = \"$ORIGINAL_VERSION\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = $ORIGINAL_VERSION_CODE/versionCode = $NEW_VERSION_CODE/" app/build.gradle.kts
          echo "Changed version from $ORIGINAL_VERSION ($ORIGINAL_VERSION_CODE) to $NEW_VERSION ($NEW_VERSION_CODE)"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION_CODE=$NEW_VERSION_CODE" >> $GITHUB_ENV

      - name: Update app name and package for nightly
        run: |
          sed -i 's/applicationId = "moe.rukamori.archivetune"/applicationId = "moe.rukamori.archivetune.nightly"/' app/build.gradle.kts
          sed -i 's/ArchiveTune Debug/ArchiveTune Nightly Debug/' app/src/debug/res/values/app_name.xml
          sed -i 's/ArchiveTune/ArchiveTune Nightly/' app/src/main/res/values/app_name.xml
          find app/src/main/res -path '*/values-*/app_name.xml' -exec sed -i 's/ArchiveTune/ArchiveTune Nightly/' {} +

      - name: Set default update channel to nightly
        run: sed -i 's/defaultValue = UpdateChannel.STABLE/defaultValue = UpdateChannel.DAILY_NIGHTLY/' app/src/main/kotlin/moe/rukamori/archivetune/ui/screens/settings/UpdateScreen.kt

      - name: Update about screen to show ABI_NIGHTLY label
        run: |
          sed -i 's/text = BuildConfig.ARCHITECTURE.uppercase(),/text = "${BuildConfig.ARCHITECTURE.uppercase()}_NIGHTLY",/' app/src/main/kotlin/moe/rukamori/archivetune/ui/screens/settings/AboutScreen.kt

      - name: Build Release APK
        shell: bash
        run: |
          GRADLE_TASK="${{ steps.variant.outputs.gradle_task }}"
          ABI="${{ matrix.abi }}"

          if [ "$ABI" = "armeabi" ] || [ "$ABI" = "x86" ]; then
            ./gradlew "$GRADLE_TASK" 2>&1 | python3 -c "import re,sys;p=re.compile(r'^(WARNING: )?\[CXX5202\] This app only has 32-bit \[(armeabi-v7a|x86)\] native libraries\. Beginning August 1, 2019 Google Play store requires that all apps that include native libraries must provide 64-bit versions\. For more information, visit https://g\.co/64-bit-requirement\$');[sys.stdout.write(l) for l in sys.stdin if not p.match(l.rstrip())]"
          else
            ./gradlew "$GRADLE_TASK"
          fi
        env:
          PULL_REQUEST: 'false'
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
          TOGETHER_BEARER_TOKEN: ${{ secrets.TOGETHER_BEARER_TOKEN }}
          CANVAS_BEARER_TOKEN: ${{ secrets.CANVAS_BEARER_TOKEN }}
          EXTRACTOR_BEARER: ${{ secrets.EXTRACTOR_BEARER }}
          NIGHTLY_BUILD_HASH: ${{ steps.build_hash.outputs.value }}

      - name: Resolve release output directory
        id: release_dir
        shell: bash
        run: |
          set -euo pipefail
          DEVICE="${{ steps.variant.outputs.device }}"
          ABI="${{ steps.variant.outputs.abi }}"
          DISTRIBUTION="${{ steps.variant.outputs.distribution }}"
          DEVICE_CAP="${{ steps.variant.outputs.device_cap }}"
          ABI_CAP="${{ steps.variant.outputs.abi_cap }}"
          CANDIDATES=(
            "app/build/outputs/apk/${DISTRIBUTION}${DEVICE_CAP}${ABI_CAP}/release"
            "app/build/outputs/apk/${DISTRIBUTION}${DEVICE}${ABI_CAP}/release"
            "app/build/outputs/apk/${DISTRIBUTION}/${DEVICE}/${ABI}/release"
            "app/build/outputs/apk/${DISTRIBUTION}/${DEVICE}${ABI_CAP}/release"
            "app/build/outputs/apk/${DISTRIBUTION}/${DEVICE_CAP}${ABI_CAP}/release"
            "app/build/outputs/apk/${DEVICE}/${ABI}/release"
            "app/build/outputs/apk/${DEVICE}${ABI_CAP}/release"
            "app/build/outputs/apk/${DEVICE_CAP}${ABI_CAP}/release"
            "app/build/outputs/apk/${ABI}/${DEVICE}/release"
          )
          for d in "${CANDIDATES[@]}"; do
            if [ -d "$d" ]; then
              echo "release_dir=$d" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          FOUND_METADATA="$(
            find app/build/outputs/apk -type f -name "output-metadata.json" \
              \( \
                -path "*/${DISTRIBUTION}/${DEVICE}/${ABI}/release/output-metadata.json" -o \
                -path "*/${DISTRIBUTION}/${DEVICE}${ABI_CAP}/release/output-metadata.json" -o \
                -path "*/${DISTRIBUTION}/${DEVICE_CAP}${ABI_CAP}/release/output-metadata.json" -o \
                -path "*/${ABI}/${DEVICE}/release/output-metadata.json" -o \
                -path "*/${DEVICE}/${ABI}/*/release/output-metadata.json" -o \
                -path "*/${DEVICE}${ABI_CAP}/*/release/output-metadata.json" -o \
                -path "*/${DEVICE_CAP}${ABI_CAP}/*/release/output-metadata.json" \
              \) \
              | head -n 1 || true
          )"
          if [ -n "${FOUND_METADATA:-}" ]; then
            echo "release_dir=$(dirname "$FOUND_METADATA")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UNSIGNED_APK=$(find app/build/outputs/apk -maxdepth 8 -type f -name "*.apk" ! -name "*signed*" 2>/dev/null | head -n 1 || true)
          if [ -n "${UNSIGNED_APK:-}" ] && [ -f "$UNSIGNED_APK" ]; then
            RELEASE_DIR=$(dirname "$UNSIGNED_APK")
            echo "release_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Could not resolve APK release output directory for DEVICE=$DEVICE ABI=$ABI"
          find app/build/outputs/apk -maxdepth 8 -type d -print || true
          exit 1

      - name: Sign APK
        id: sign_app
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: ${{ steps.release_dir.outputs.release_dir }}/
          signingKey: ${{ secrets.SIGNING_KEY_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Move signed APK
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="${{ steps.release_dir.outputs.release_dir }}"
          mkdir -p "$RELEASE_DIR/out"
          SIGNED_APK=$(find "$RELEASE_DIR" -type f \( -name "*-signed.apk" -o -name "*-unsigned-signed.apk" \) | head -n 1)
          mv "$SIGNED_APK" "$RELEASE_DIR/out/${{ steps.variant.outputs.apk_name }}"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.variant.outputs.artifact_name }}
          path: ${{ steps.release_dir.outputs.release_dir }}/out/${{ steps.variant.outputs.apk_name }}

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.repository }}
          ref: main
          token: ${{ github.token || secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: Setup Java
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@v2.0

      - name: Generate changelog
        run: kotlin .github/scripts/generate-changelog.main.kts
        env:
          REPO_PATH: "rukamori/ArchiveTune"
          BRANCH: "dev"
          SINCE_SHA: ${{ needs.build.outputs.since_sha }}

      - name: Date
        id: date
        run: echo "date=$(date -u +'%Y/%m/%d - %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Read changelog
        id: changelog
        run: |
          CHANGELOG=$(cat changelog.md)
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: AI Summary
        id: ai_summary
        if: env.OPENROUTER_API_KEY != ''
        run: |
          AI_TEXT=$(python3 .github/scripts/ai-summary.py) || true
          if [ -z "$AI_TEXT" ]; then
            echo "AI summarization failed" >&2
            echo "summary=" >> $GITHUB_OUTPUT
          else
            {
              echo "summary<<EOF"
              echo "$AI_TEXT"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Download APK Artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded_artifacts/

      - name: Build release body
        id: release_body
        run: |
          cat > release_body.md << 'RELEASE_BODY_EOF'
          Release **ArchiveTune Nightly** artifact, generated on **${{ steps.date.outputs.date }} (UTC +0)**

          ${{ steps.ai_summary.outputs.summary }}

          ${{ steps.changelog.outputs.changelog }}
          RELEASE_BODY_EOF

      - name: Create release
        uses: softprops/action-gh-release@v3.0.1
        with:
          token: ${{ github.token }}
          tag_name: ${{ needs.build.outputs.new_version }}
          name: ${{ needs.build.outputs.new_version }}
          body_path: release_body.md
          files: |
            downloaded_artifacts/**/*.apk

      - name: Check WEBHOOK_URL is set
        run: |
          if [ -z "${{ secrets.WEBHOOK_URL }}" ]; then
            echo "Error: WEBHOOK_URL secret is not set or is empty."
            exit 1
          fi

      - name: Wait for release to be available
        run: |
          sleep 5

      - name: Get latest release
        id: get_release
        run: |
          LATEST_RELEASE=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest)

          if echo "$LATEST_RELEASE" | jq -e '.message' > /dev/null 2>&1; then
            ERROR_MSG=$(echo "$LATEST_RELEASE" | jq -r '.message')
            echo "Error fetching release: $ERROR_MSG"
            exit 1
          fi

          VERSION_TITLE=$(echo "$LATEST_RELEASE" | jq -r '.name')
          RELEASE_TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')

          if [ -z "$VERSION_TITLE" ] || [ "$VERSION_TITLE" = "null" ]; then
            echo "Error: Could not extract version title from release"
            exit 1
          fi

          if [ -z "$RELEASE_TAG" ] || [ "$RELEASE_TAG" = "null" ]; then
            echo "Error: Could not extract release tag from release"
            exit 1
          fi

          echo "version_title=$VERSION_TITLE" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          echo "✓ Successfully retrieved release: $VERSION_TITLE ($RELEASE_TAG)"

      - name: 🤖 Generate AI release message
        id: ai_message
        if: env.OPENROUTER_API_KEY != ''
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          RELEASE_TAG="${{ steps.get_release.outputs.release_tag }}"
          VERSION_TITLE="${{ steps.get_release.outputs.version_title }}"
          MENTION_ROLE="${{ secrets.DISCORD_MENTION_ROLE }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/$RELEASE_TAG"

          RELEASE_DATA=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG)
          RELEASE_BODY=$(echo "$RELEASE_DATA" | jq -r '.body // "No release notes available."')

          # Write prompt to file to avoid ARG_MAX
          cat > /tmp/discord_prompt.txt << PROMPT_EOF
          You are a release announcer. Generate a concise Discord release announcement for ArchiveTune Nightly.

          Requirements:
          - Total message must be under 2000 characters
          - First line must be: "# ArchiveTune Nightly $VERSION_TITLE has been released"
          - Use ONLY Discord-compatible Markdown
          - Supported: **bold**, *italic*, __underline__, ~~strikethrough~~, ### headings, -/* bullet lists, 1. numbered lists, inline code with single backticks, code blocks with triple backticks, > blockquotes, [masked links](url), ||spoilers||, -# subtext
          - Do NOT use: --- horizontal rules, - [ ] checkboxes, HTML tags, tables, details/summary, footnotes, or any other non-Discord Markdown
          - Include a link to the release: $RELEASE_URL
          - Include this role mention somewhere in the message: $MENTION_ROLE
          - Summarize the key changes concisely from the release notes below
          - Keep it friendly and exciting, but professional

          Release notes:
          $RELEASE_BODY
          PROMPT_EOF

          jq -n \
            --arg model "openrouter/owl-alpha" \
            --rawfile content /tmp/discord_prompt.txt \
            '{model: $model, messages: [{role: "user", content: $content}]}' \
            > /tmp/discord_payload.json

          MAX_RETRIES=3
          RETRY_COUNT=0
          WAIT_TIME=15

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENROUTER_API_KEY" \
              -d @/tmp/discord_payload.json)

            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')

            if [ -z "$ERROR" ]; then
              break
            fi

            if echo "$RESPONSE" | jq -e '.error.code == 429' > /dev/null; then
              echo "Rate limit exceeded (429). Retrying in ${WAIT_TIME}s... (Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
              sleep $WAIT_TIME
              RETRY_COUNT=$((RETRY_COUNT + 1))
              WAIT_TIME=$((WAIT_TIME * 2))
            else
              echo "API Error: $ERROR"
              break
            fi
          done

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$AI_TEXT" ] || [ "$AI_TEXT" = "null" ]; then
            echo "AI message generation failed or returned empty."
            echo "generated_message=" >> $GITHUB_OUTPUT
          else
            AI_TEXT="${AI_TEXT:0:2000}"
            AI_TEXT=$(echo "$AI_TEXT" | sed '/^---$/d')
            {
              echo "generated_message<<EOF"
              echo "$AI_TEXT"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            echo "✓ AI release message generated successfully"
          fi

      - name: Send Discord notification
        env:
          AI_MESSAGE: ${{ steps.ai_message.outputs.generated_message }}
        run: |
          VERSION_TITLE="${{ steps.get_release.outputs.version_title }}"
          RELEASE_TAG="${{ steps.get_release.outputs.release_tag }}"

          if [ -n "$AI_MESSAGE" ]; then
            MESSAGE="$AI_MESSAGE"
          else
            MESSAGE="# New daily version of __ArchiveTune Nightly__ has been released.

            > - Ohaiyo, **ArchiveTune $VERSION_TITLE** has been released. You can view changlog and download inside **ArchiveTune Nightly** app or with this link below.
            > - **Link:** https://github.com/${{ github.repository }}/releases/$RELEASE_TAG
            > - **Mention:** ${{ secrets.DISCORD_MENTION_ROLE }}"
          fi

          PAYLOAD=$(jq -n --arg msg "$MESSAGE" '{content: $msg}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Content-Type: application/json" -d "$PAYLOAD" "${{ secrets.WEBHOOK_URL }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

          if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Discord notification sent successfully"
          else
            echo "✗ Failed to send Discord notification (HTTP $HTTP_CODE)"
            exit 1
          fi



  sync-readme:
    needs: [create-release]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔎 Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          token: ${{ github.token }}

      - name: 👍 Your fork, your documentation
        run: |
          sed -i 's|rukamori/canary|${{ github.repository }}|g' README.md

      - name: 📖 Read current README values
        id: read-current
        run: |
          echo "Reading current GIF counter line from README..."
          CURRENT_GIF=$(grep '\[!\[Download\](https://rule34.xxx/counter/' README.md | head -1 || echo "")
          echo "Current GIF line: $CURRENT_GIF"
          echo "current_gif<<EOF" >> $GITHUB_OUTPUT
          echo "$CURRENT_GIF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Reading current certificate fingerprints from README..."
          CURRENT_SHA1=$(grep -A1 '```plaintext' README.md | grep -v '```plaintext' | grep -v '^--$' | head -1 || echo "")
          CURRENT_SHA256=$(grep -A1 '```plaintext' README.md | grep -v '```plaintext' | grep -v '^--$' | tail -1 || echo "")
          echo "Current SHA1: $CURRENT_SHA1"
          echo "Current SHA256: $CURRENT_SHA256"
          echo "current_sha1<<EOF" >> $GITHUB_OUTPUT
          echo "$CURRENT_SHA1" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "current_sha256<<EOF" >> $GITHUB_OUTPUT
          echo "$CURRENT_SHA256" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: ⌨️ Update GIF counters from latest release
        run: |
          RELEASE_JSON=$(curl -s -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")

          VERSION=$(echo "$RELEASE_JSON" | grep '"tag_name"' | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
          DATE_DIGITS=$(echo "$VERSION" | sed 's/^N//')

          echo "Latest version: $VERSION"
          echo "Date digits: $DATE_DIGITS"

          GIF_URLS=""
          for i in $(seq 0 7); do
            DIGIT=${DATE_DIGITS:$i:1}
            if [ $i -lt 7 ]; then
              GIF_URLS="$GIF_URLS[![Download](https://rule34.xxx/counter/$DIGIT.gif)](https://github.com/${{ github.repository }}/releases/latest) "
            else
              GIF_URLS="$GIF_URLS[![Download](https://rule34.xxx/counter/$DIGIT.gif)](https://github.com/${{ github.repository }}/releases/latest)"
            fi
          done

          echo "Generated GIF URLs: $GIF_URLS"

          OLD_GIF="${{ steps.read-current.outputs.current_gif }}"
          echo "🔄 Replacing old GIF: $OLD_GIF"
          echo "🆕 With new GIF: $GIF_URLS"
          if [ -n "$OLD_GIF" ]; then
            content=$(<README.md)
            content="${content//"$OLD_GIF"/$GIF_URLS}"
            printf '%s\n' "$content" > README.md
          fi

          sed -i "s|github.com/rukamori/canary/releases/latest|github.com/${{ github.repository }}/releases/latest|g" README.md

      - name: 🔐 Update certificate fingerprints from signed APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA1="2C:19:C7:E8:07:61:2B:8E:94:51:1B:FD:72:67:07:64:5D:C2:58:AE"
          SHA256="67:E1:51:00:BB:80:93:01:78:3E:DC:B6:34:8F:A3:BB:F8:30:34:D9:1E:62:86:8A:91:05:3D:BD:70:DB:3F:18"

          API_URL="https://api.github.com/repos/${{ github.repository }}/releases/latest"
          RELEASE_JSON=$(curl -sf -H "Authorization: token $GH_TOKEN" "$API_URL") || RELEASE_JSON=""

          if [ -n "$RELEASE_JSON" ]; then
            DL_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name == "app-gms-mobile-universal-nightly.apk") | .url' 2>/dev/null || true)

            if [ -n "$DL_URL" ]; then
              echo "Downloading universal APK from release..."
              curl -sfL -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/octet-stream" \
                "$DL_URL" -o /tmp/app.apk && {

                CERT_INFO=$(keytool -printcert -jarfile /tmp/app.apk 2>/dev/null)
                EXTRACTED_SHA1=$(echo "$CERT_INFO" | grep -i "SHA1:" | sed 's/.*SHA1: //' | xargs || true)
                EXTRACTED_SHA256=$(echo "$CERT_INFO" | grep -i "SHA256:" | sed 's/.*SHA256: //' | xargs || true)

                if [ -n "$EXTRACTED_SHA1" ] && [ -n "$EXTRACTED_SHA256" ]; then
                  SHA1="$EXTRACTED_SHA1"
                  SHA256="$EXTRACTED_SHA256"
                  echo "✅ Extracted fingerprints from release APK"
                fi
              } || echo "⚠️ APK download failed, using fallback"
            else
              echo "ℹ️ Universal APK not found in latest release, using fallback"
            fi
          else
            echo "ℹ️ No releases found yet, using fallback fingerprints"
          fi

          echo "SHA-1:   $SHA1"
          echo "SHA-256: $SHA256"

          OLD_SHA1="${{ steps.read-current.outputs.current_sha1 }}"
          OLD_SHA256="${{ steps.read-current.outputs.current_sha256 }}"
          echo "🔄 Replacing old SHA1: $OLD_SHA1"
          echo "🆕 With new SHA1: $SHA1"
          echo "🔄 Replacing old SHA256: $OLD_SHA256"
          echo "🆕 With new SHA256: $SHA256"

          if [ -n "$OLD_SHA1" ]; then
            sed -i "s|$OLD_SHA1|$SHA1|g" README.md
          fi
          if [ -n "$OLD_SHA256" ]; then
            sed -i "s|$OLD_SHA256|$SHA256|g" README.md
          fi

          echo "✅ Updated certificate fingerprints in README.md"

      - name: 🔄 Commit and push
        run: |
          git config --global user.name 'github-actions[bot]' || true
          git config --global user.email 'github-actions[bot]@users.noreply.github.com' || true

          git add README.md

          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          git commit -m "ci(docs): Sync README.md from workflow run ${TIMESTAMP}" || echo "Nothing new to commit"

          git fetch origin main
          git rebase origin/main
          git push origin main --force-with-lease

          echo "✅ README.md successfully synced and pushed to main branch"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Build failed on $(date)"
